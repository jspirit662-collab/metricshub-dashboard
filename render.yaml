services:
  - type: web
    name: metricshub-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_proxy:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AIRTABLE_TOKEN
        sync: false
