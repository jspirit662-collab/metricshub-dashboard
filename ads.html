<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meta Ads — Acceso Privado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF5F2;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
#lock-screen{text-align:center;background:#fff;padding:48px 40px;border-radius:16px;box-shadow:0 4px 24px rgba(28,20,16,.12);border:1.5px solid #FFD8CE;max-width:400px;width:90%}
#lock-screen .lock-ico{width:64px;height:64px;background:#FF6248;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 20px}
#lock-screen h1{font-size:20px;color:#1C1410;margin-bottom:6px}
#lock-screen p{font-size:13px;color:#9C8A84;margin-bottom:24px}
#lock-screen input{width:100%;padding:12px 16px;border:1.5px solid #FFD8CE;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
#lock-screen input:focus{border-color:#FF6248}
#lock-screen button{width:100%;padding:12px;margin-top:12px;background:#FF6248;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
#lock-screen button:hover{background:#E8503A}
#lock-screen .error{color:#DC2626;font-size:12px;margin-top:10px;display:none}
#app-frame{display:none;width:100%;height:100vh;border:none;position:fixed;top:0;left:0}
</style>
</head>
<body>
<div id="lock-screen">
<div class="lock-ico">&#128274;</div>
<h1>Acceso Privado</h1>
<p>Introduce la contraseña para acceder al dashboard</p>
<input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPwd()"/>
<button onclick="checkPwd()">Acceder</button>
<div class="error" id="err">Contraseña incorrecta</div>
</div>
<iframe id="app-frame"></iframe>
<script>
const H='e4a114787a29c3be3b795ae110cb790eec0299c6ef259cc03881e8a7ba791d49';
async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function checkPwd(){const v=document.getElementById('pwd').value;const h=await sha256(v);if(h===H){document.getElementById('lock-screen').style.display='none';const f=document.getElementById('app-frame');f.style.display='block';f.srcdoc=atob(document.getElementById('d').textContent);}else{document.getElementById('err').style.display='block';document.getElementById('pwd').style.borderColor='#DC2626';setTimeout(()=>{document.getElementById('err').style.display='none';document.getElementById('pwd').style.borderColor='#FFD8CE'},2000)}}
</script>
