<!DOCTYPE html>

<head>

<title>Meta Ads — Acceso Privado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF5F2;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
#lock-screen{text-align:center;background:#fff;padding:48px 40px;border-radius:16px;box-shadow:0 4px 24px rgba(28,20,16,.12);border:1.5px solid #FFD8CE;max-width:400px;width:90%}
#lock-screen .lock-ico{width:64px;height:64px;background:#FF6248;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 20px}
#lock-screen h1{font-size:20px;color:#1C1410;margin-bottom:6px}
#lock-screen p{font-size:13px;color:#9C8A84;margin-bottom:24px}
#lock-screen input{width:100%;padding:12px 16px;border:1.5px solid #FFD8CE;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
#lock-screen input:focus{border-color:#FF6248}
#lock-screen button{width:100%;padding:12px;margin-top:12px;background:#FF6248;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
#lock-screen button:hover{background:#E8503A}
#lock-screen .error{color:#DC2626;font-size:12px;margin-top:10px;display:none}
#dashboard{display:none}
</style>
</head>
<body>

<div id="lock-screen">
 <div class="lock-ico">&#128274;</div>
 <h1>Acceso Privado</h1>
 <p>Introduce la contrase\u00f1a para acceder al dashboard</p>
 <input type="password" id="pwd" placeholder="Contrase\u00f1a" onkeydown="if(event.key==='Enter')checkPwd()"/>
 <button onclick="checkPwd()">Acceder</button>

<div id="dashboard">
</div>

<script>
const HASH='e4a114787a29c3be3b795ae110cb790eec0299c6ef259cc03881e8a7ba791d49';
async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function checkPwd(){const v=document.getElementById('pwd').value;const h=await sha256(v);if(h===HASH){document.getElementById('lock-screen').style.display='none';document.getElementById('dashboard').style.display='block';initDashboard();}else{document.getElementById('err').style.display='block';document.getElementById('pwd').style.borderColor='#DC2626';setTimeout(()=>{document.getElementById('err').style.display='none';document.getElementById('pwd').style.borderColor='#FFD8CE'},2000)}}
</script>

.kc-coral::after{background:var(--coral)}.kc-ok::after{background:var(--ok)}.kc-warn::after{background:var(--warn)}.kc-blue::after{background:var(--blue)}.kc-purple::after{background:var(--purple)}

.kpi-d{margin-top:5px;font-size:11.5px;color:var(--muted)}
.kpi-ico{position:absolute;top:14px;right:14px;font-size:20px;opacity:.12}

.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.filter-lbl{font-size:12px;font-weight:600;color:var(--textM);min-width:80px}
.pill-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--textM);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.pill-btn:hover{border-color:var(--coral);color:var(--coral)}
.pill-btn.active{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600}
.sort-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--textM);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:4px}
.sort-btn:hover{border-color:var(--coral);color:var(--coral)}
.sort-btn.active{background:var(--coralS);border-color:var(--coral);color:var(--coral);font-weight:600}
.cc{background:var(--surface);border:1.5px solid var(--borderL);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:18px}
.cc h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:13px}
.cc h3 small{color:var(--muted);font-weight:400;font-size:11px;margin-left:5px}
.cw{position:relative}.h320{height:320px}
.tbl-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 11px;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--borderL);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--coral)}
td{padding:10px 11px;border-bottom:1px solid var(--borderL);color:var(--textM)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-ok{background:var(--okS);color:var(--ok)}
.cost-green{color:#16A34A;font-weight:700}
.cost-yellow{color:#D97706;font-weight:700}
.cost-red{color:#DC2626;font-weight:700}
.cost-dash{color:var(--muted)}
@media(max-width:1100px){.kpi-g{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){#sb{width:56px}.sb-name,.sb-sub,.ni span,.sb-lbl{display:none}#main{margin-left:56px;padding:16px}.kpi-g{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kpi-g{grid-template-columns:1fr 1fr}}
`;
document.head.appendChild(style);

// Load Chart.js
const chartScript=document.createElement('script');
chartScript.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
chartScript.onload=function(){renderChart();renderLegend()};
document.head.appendChild(chartScript);

d.innerHTML=`
<nav id="sb">
 <div class="sb-logo">
  <div class="sb-ico">E</div>
  <div><div class="sb-name">Estrategas</div><div class="sb-sub">Control de Negocio</div></div>

 <div class="sb-grp">
  <div class="sb-lbl">Paneles</div>
  <a href="index.html" class="ni"><span class="ni-ico">\u{1F4F2}</span><span>Marketing</span></a>
  <a href="clientes.html" class="ni"><span class="ni-ico">\u{1F3CB}\uFE0F</span><span>Clientes</span></a>
  <a href="ads.html" class="ni on"><span class="ni-ico">\u{1F4E3}</span><span>Meta Ads</span></a>
 </div>
</nav>
<div id="main">
 <div class="topbar">
  <div><h1>Meta Ads \u2014 Rendimiento por Anuncio</h1><p>Campa\u00f1a [TT-TF] Formulario asesor\u00edas \u00b7 Vol ETR (correcta)</p></div>
  <div class="topbar-r"><div class="period-pill">\u{1F4C5} <span>1\u201323 mar 2026</span></div></div>
 </div>
 <div class="kpi-g">
  <div class="kpi kc-coral"><div class="kpi-ico">\u{1F4B8}</div><div class="kpi-lbl">Gasto Total</div><div class="kpi-val">\u20AC2.112</div><div class="kpi-d">\u20AC2.112,45 acumulados</div></div>
  <div class="kpi kc-blue"><div class="kpi-ico">\u{1F3AF}</div><div class="kpi-lbl">Leads Totales</div><div class="kpi-val">201</div><div class="kpi-d">Formularios enviados</div></div>
  <div class="kpi kc-warn"><div class="kpi-ico">\u{1F4CA}</div><div class="kpi-lbl">CPL Medio</div><div class="kpi-val">\u20AC10,51</div><div class="kpi-d">Coste por lead</div></div>
  <div class="kpi kc-ok"><div class="kpi-ico">\u{1F4C5}</div><div class="kpi-lbl">Agendas</div><div class="kpi-val">31</div><div class="kpi-d">Confirmadas en GHL</div></div>
  <div class="kpi kc-purple"><div class="kpi-ico">\u{1F4B0}</div><div class="kpi-lbl">\u20AC/Agenda Media</div><div class="kpi-val">\u20AC68,14</div><div class="kpi-d">Coste por cita</div></div>
 </div>
 <div class="filter-section">
  <h3>Filtros y Ordenaci\u00f3n</h3>
  <div class="filter-row"><span class="filter-lbl">Mostrar:</span>
   <button class="pill-btn active" onclick="setFilter('todos',this)">Todos</button>
   <button class="pill-btn" onclick="setFilter('con',this)">Con agendas \u2705</button>
   <button class="pill-btn" onclick="setFilter('sin',this)">Sin agendas</button>
  </div>
  <div class="filter-row"><span class="filter-lbl">Ordenar:</span>
   <button class="sort-btn active" onclick="setSort('gasto','desc',this)">Gasto \u2193</button>
   <button class="sort-btn" onclick="setSort('leads','desc',this)">Leads \u2193</button>
   <button class="sort-btn" onclick="setSort('cpl','asc',this)">CPL \u2191</button>
   <button class="sort-btn" onclick="setSort('agendas','desc',this)">Agendas \u2193</button>
   <button class="sort-btn" onclick="setSort('cpa','asc',this)">\u20AC/Agenda \u2191</button>
  </div>
 </div>
 <div class="cc"><h3>Anuncios <small id="tbl-count">25 anuncios</small></h3><div class="tbl-wrap"><table id="ads-table"><thead><tr><th>Anuncio</th><th>Gasto \u20AC</th><th>Leads</th><th>CPL \u20AC</th><th>Agendas</th><th>\u20AC/Agenda</th></tr></thead><tbody id="ads-tbody"></tbody></table></div></div>
 <div class="cc"><h3>\u20AC/Agenda por Anuncio <small>solo anuncios con citas confirmadas \u00b7 menor es mejor</small></h3><div class="cw h320"><canvas id="ch-cpa"></canvas></div></div>
</div>
`;

const ADS=[
{nombre:'7 HOMBRES + 30 A\u00d1OS',gasto:11.55,leads:1,cpl:11.55,agendas:1,cpa:11.55},
{nombre:'busco 5 dejar de arrastrarse',gasto:19.01,leads:4,cpl:4.75,agendas:1,cpa:19.01},
{nombre:'testimonio aitor',gasto:24.75,leads:4,cpl:6.19,agendas:1,cpa:24.75},
{nombre:'7 mujeres +30 a\u00f1os (\u00d72 adsets)',gasto:251.89,leads:32,cpl:7.87,agendas:9,cpa:27.99},
{nombre:'busco 5 que quieran disfrutar',gasto:76.04,leads:12,cpl:6.34,agendas:2,cpa:38.02},
{nombre:'xim abc cuantificaci\u00f3n',gasto:104.46,leads:9,cpl:11.61,agendas:2,cpa:52.23},
{nombre:'bernat sufrir subidas',gasto:210.08,leads:23,cpl:9.13,agendas:4,cpa:52.52},

];
let currentFilter='todos';let currentSort={key:'gasto',dir:'desc'};
window.setFilter=function(f,btn){currentFilter=f;document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable()};
window.setSort=function(key,dir,btn){currentSort={key,dir};document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable()};
function getFiltered(){let data=ADS.slice();if(currentFilter==='con')data=data.filter(a=>a.agendas>0);if(currentFilter==='sin')data=data.filter(a=>a.agendas===0);const{key,dir}=currentSort;data.sort((a,b)=>{let va=a[key],vb=b[key];if(va===null&&vb===null)return 0;if(va===null)return dir==='asc'?1:-1;if(vb===null)return dir==='asc'?-1:1;return dir==='asc'?va-vb:vb-va});return data}
function cpaClass(cpa){if(cpa===null)return'cost-dash';if(cpa<40)return'cost-green';if(cpa<=80)return'cost-yellow';return'cost-red'}
function fmt(n,dec=2){if(n===null||n===undefined)return'\u2014';return n.toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec})}
function renderTable(){const data=getFiltered();document.getElementById('tbl-count').textContent=data.length+' anuncio'+(data.length!==1?'s':'');const tbody=document.getElementById('ads-tbody');tbody.innerHTML=data.map(a=>{const badge=a.agendas>0?`<span class="badge b-ok">${a.agendas} \u2705</span>`:`<span style="color:var(--muted)">0</span>`;const cpaCell=`<span class="${cpaClass(a.cpa)}">${a.cpa!==null?'\u20AC'+fmt(a.cpa):'\u2014'}</span>`;return`<tr><td style="font-weight:${a.agendas>0?'600':'400'};color:${a.agendas>0?'var(--text)':'var(--textM)'}">${a.nombre}</td><td>\u20AC${fmt(a.gasto)}</td><td>${a.leads>0?a.leads:'<span style="color:var(--muted)">0</span>'}</td><td>${a.cpl!==null?'\u20AC'+fmt(a.cpl):'<span style="color:var(--muted)">\u2014</span>'}</td><td>${badge}</td><td>${cpaCell}</td></tr>`}).join('')}

function renderChart(){
const withAgendas=ADS.filter(a=>a.agendas>0&&a.cpa!==null).slice().sort((a,b)=>a.cpa-b.cpa);
const labels=withAgendas.map(a=>a.nombre);const vals=withAgendas.map(a=>a.cpa);
const colors=vals.map(v=>v<40?'#16A34A':v<=80?'#D97706':'#DC2626');
const ctx=document.getElementById('ch-cpa');
new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'\u20AC/Agenda',data:vals,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1C1410',padding:10,cornerRadius:8,callbacks:{label:ctx=>` \u20AC${ctx.parsed.x.toFixed(2)}/agenda`,afterLabel:ctx=>{const ad=withAgendas[ctx.dataIndex];return[` Agendas: ${ad.agendas}`,` Gasto: \u20AC${ad.gasto.toFixed(2)}`,` Leads: ${ad.leads}`]}}}},scales:{x:{grid:{color:'rgba(255,216,206,0.6)'},ticks:{color:'#9C8A84',font:{size:11},callback:v=>'\u20AC'+v},beginAtZero:true},y:{grid:{display:false},ticks:{color:'#1C1410',font:{size:11.5},callback:function(val){const lbl=this.getLabelForValue(val);return lbl.length>38?lbl.slice(0,36)+'\u2026':lbl}}}}}})
}
function renderLegend(){
const legendHtml=`<div style="display:flex;gap:16px;align-items:center;margin-top:10px;font-size:12px">
<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#16A34A;display:inline-block"></span> &lt;\u20AC40 (\u00f3ptimo)</span>
<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#D97706;display:inline-block"></span> \u20AC40\u2013\u20AC80 (aceptable)</span>
<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:#DC2626;display:inline-block"></span> &gt;\u20AC80 (alto)</span>
</div>`;
document.querySelector('.cc:last-child h3').insertAdjacentHTML('afterend',legendHtml)
}
renderTable();
}
